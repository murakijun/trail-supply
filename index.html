<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1e40af" />

    <!-- iOS PWA必須 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="補給管理" />
    <link rel="apple-touch-icon" href="/trail-supply/pwa-192x192.png" />

    <!-- PWAマニフェスト -->
    <link rel="manifest" href="/trail-supply/manifest.webmanifest" />

    <title>補給管理システム</title>

    <!-- Service Worker登録（workbox不使用・シンプル直接登録） -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/trail-supply/sw.js', { scope: '/trail-supply/' })
            .then(function (reg) {
              console.log('[SW] registered', reg.scope);
            })
            .catch(function (err) {
              console.error('[SW] registration failed', err);
            });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
